<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Критически важно для мобильных устройств -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Аккредитация — Твой Тренажер</title>
    <style>
        :root {
            --primary-color: #007bff;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --bg-color: #f0f2f5;
         }

         button {
            cursor: pointer; /* Добавьте эту строку сюда */
            -webkit-tap-highlight-color: transparent;
         }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg-color); 
            margin: 0;
            padding: 10px; /* Минимальный отступ на мобилках */
            display: flex; 
            justify-content: center; 
        }

        .container { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 800px; 
            box-sizing: border-box;
        }

        h2 { text-align: center; color: #333; font-size: 1.5rem; margin-top: 0; }
        
        /* Управление сверху */
        .controls { 
            display: flex; 
            flex-direction: column; /* На мобилках в колонку */
            gap: 10px; 
            margin-bottom: 20px; 
        }

        select, .btn-gen { 
            padding: 14px; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            font-size: 16px; 
            outline: none;
        }

        .btn-gen { 
            background: var(--primary-color); 
            color: white; 
            border: none; 
            font-weight: bold; 
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-gen:active { opacity: 0.8; }

        /* Блок вопроса */
        .question-block { 
            background: #fdfdfd; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 10px; 
            border: 1px solid #eee;
            border-left: 5px solid var(--primary-color); 
        }

        .question-text { 
            font-size: 1.05rem; 
            font-weight: 600; 
            margin-bottom: 15px; 
            display: block; 
            line-height: 1.4;
        }
        
        /* Сетка ответов */
        .options-container { 
            display: grid; 
            gap: 8px; 
            grid-template-columns: 1fr; /* По умолчанию в один столбец */
        }

        .option-btn { 
            padding: 12px 15px; 
            border: 2px solid #eee; 
            border-radius: 8px; 
            background: #fff; 
            cursor: pointer; 
            text-align: left; 
            font-size: 15px;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent; /* Убирает синюю вспышку на Android */
        }

        .option-btn.selected { border-color: var(--primary-color); background: #e7f1ff; }
        .option-btn.correct-res { background: var(--success-color) !important; color: white; border-color: var(--success-color); }
        .option-btn.wrong-res { background: var(--danger-color) !important; color: white; border-color: var(--danger-color); }

        .btn-check { 
            width: 100%; 
            padding: 16px; 
            background: var(--success-color); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            display: none; 
            margin-top: 10px; 
        }

        #score-display { 
            text-align: center; 
            font-size: 1.3rem; 
            margin-top: 20px; 
            padding: 15px;
            border-radius: 8px;
        }

        /* --- АДАПТИВНОСТЬ ДЛЯ ПК (экраны шире 600px) --- */
        @media (min-width: 600px) {
            body { padding: 30px; }
            .container { padding: 30px; }
            .controls { flex-direction: row; } /* Выстраиваем в ряд */
            .options-container { grid-template-columns: 1fr 1fr; } /* Ответы в 2 колонки */
            h2 { font-size: 2rem; }
        }
    </style>
</head>

    <div id="score-display"></div>

    let currentQuestions = [];
    let userSelections = [];

    function generateTest() {
        const subject = document.getElementById('subject-select').value;
        let allQuestions = [...questionBank[subject]];
        
        if (!allQuestions || allQuestions.length === 0) {
            alert("В этом разделе пока нет вопросов.");
            return;
        }

        allQuestions.sort(() => Math.random() - 0.5);
        currentQuestions = allQuestions.slice(0, 20);
        userSelections = new Array(currentQuestions.length).fill(null);
        
        const container = document.getElementById('quiz-container');
        container.innerHTML = "";
        
        
        currentQuestions.forEach((item, qIdx) => {
            let optionsHtml = item.options.map(opt => `
                <button class="option-btn" onclick="selectOption(${qIdx}, '${opt}', this)">${opt}</button>
            `).join('');

let imageHtml = item.img ? `<img src="${item.img}" class="question-img" style="max-width: 100%; display: block; margin: 10px 0;">` : "";
            
                 container.innerHTML += `
                <div class="question-block" id="q-block-${qIdx}">
                    <span class="question-text">${qIdx + 1}. ${item.q}</span>
                      ${imageHtml} 
                    <div class="options-container">${optionsHtml}</div>
                </div>
            `;
        });
     
        document.getElementById('check-btn').style.display = "block";
        document.getElementById('score-display').style.display = "none";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function selectOption(qIdx, val, btn) {
        const buttons = btn.parentElement.querySelectorAll('.option-btn');
        buttons.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        userSelections[qIdx] = val;
    }

    function checkAnswers() {
        let score = 0;
        currentQuestions.forEach((item, qIdx) => {
            const block = document.getElementById(`q-block-${qIdx}`);
            const buttons = block.querySelectorAll('.option-btn');
            
            buttons.forEach(btn => {
                btn.onclick = null;
                const text = btn.innerText;
                if (text === item.a) btn.classList.add('correct-res');
                if (userSelections[qIdx] === text && text !== item.a) btn.classList.add('wrong-res');
            });
            if (userSelections[qIdx] === item.a) score++;
        });

        const scoreDisplay = document.getElementById('score-display');
        scoreDisplay.style.display = "block";
        scoreDisplay.innerHTML = `Ваш результат: ${score} из ${currentQuestions.length}`;
        scoreDisplay.style.background = score > 15 ? "#e7f4e9" : "#fbeaea";
        
        document.getElementById('check-btn').style.display = "none";
    }
</script>
